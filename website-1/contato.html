<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid custom-flex">

                <a class="navbar-brand brand-flex" href="#">
                    <h1>PixelForge Studios</h1>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"

            </div>

    </header>

    <main class="corpo">

        <h1 id="hh1">Fale Conosco</h1>

        <form class="form-contato">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
            </div>

            <div class="form-group">
                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto" placeholder="Assunto da mensagem" required>
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <input id="mensagem" name="mensagem" class="textarea-mensagem" placeholder="Digite sua mensagem aqui..."
                    required></input>
            </div>

            <button type="submit" class="btn-enviar">Enviar</button>
        </form>
    </main>

    <br>
